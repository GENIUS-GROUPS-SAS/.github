name: 🐛 Bug Report
description: Report a reproducible bug in a GENIUS GROUPS product or library
title: "[bug]: "
labels: ["bug", "triage"]
projects: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report

        Thank you for taking the time to report a bug. Before submitting, please:

        - **Search** existing issues to avoid duplicates.
        - **Verify** the bug exists on the latest version.
        - **Collect** reproduction steps, logs, and environment details.

        The more detail you provide, the faster we can triage and fix.
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which GENIUS GROUPS product is affected?
      options:
        - GeniusPay™
        - Genius Invoice™
        - Genius Docs Sign™
        - Genius Identity™
        - Genius AI™
        - Genius Work™
        - Genius Runtime™
        - Genius Cloud™
        - MonEglise.™
        - StartUp.™
        - .github (this repository)
        - Other / Infrastructure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you running? (check package.json, composer.json, or release tags)
      placeholder: "e.g., v1.2.3, main@abc1234"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Bug Summary
      description: A clear and concise description of what the bug is.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Minimal, ordered steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Stack Trace
      description: Paste any relevant error messages, stack traces, or console output. Use code blocks.
      render: shell
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Tell us about your environment.
      placeholder: |
        - OS: [e.g., macOS 14.5, Ubuntu 24.04, iOS 18]
        - Browser: [e.g., Chrome 126, Safari 17]
        - Runtime: [e.g., Node 20, PHP 8.3, Python 3.12]
        - Database: [e.g., PostgreSQL 16]
        - Docker: [e.g., Docker 24.0]
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else that might be relevant? Screenshots, configuration files, related issues?
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate.
          required: true
        - label: I have tested this on the latest version and the bug still reproduces.
          required: true
        - label: I have removed any sensitive information (API keys, credentials, PII) from this report.
          required: true
